#Declare loggers
status = error
name= PropertiesConfig
appenders=console, file
rootLogger.level= All
rootLogger.appenderRefs = ref_stdout, ref_logfile
rootLogger.appenderRef.ref_stdout.ref = STDOUT
rootLogger.appenderRef.ref_logfile.ref= LOGFILE

# Direct log messages to Console
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern =%d{HH:mm:ss} %-5level [%c] :: %msg%n

# Direct log messages to a log file
appender.file.type = File
appender.file.name = LOGFILE
appender.file.fileName=logs\\${date:yyyy-MM-dd_HH_mm_ss}.log
appender.file.layout.type=PatternLayout
appender.file.layout.pattern=%d{yyyy/MM/dd HH:mm:ss.SSS} %-5level [%c] :: %msg%n